name: RAPTOR Min Finder

on:
  schedule:
    # Scansione notturna — tutti i giorni feriali alle 03:00 IT (02:00 UTC)
    - cron: '0 2 * * 1-5'
    # Live update — 09:30 IT (08:30 UTC) e 16:00 IT (15:00 UTC)
    - cron: '30 8 * * 1-5'
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modalità'
        required: true
        default: 'live'
        type: choice
        options:
          - live
          - full

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy --break-system-packages -q || pip install yfinance numpy -q

      - name: Determine mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MANUAL="${{ github.event.inputs.mode }}"
          if [ "$MANUAL" = "full" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "02" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=live" >> $GITHUB_OUTPUT
          fi

      - name: Run full scan (notturno)
        if: steps.mode.outputs.mode == 'full'
        run: python fetch_min_finder.py

      - name: Run live update
        if: steps.mode.outputs.mode == 'live'
        run: python update_min_finder_live.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update min_finder data [$(date -u '+%Y-%m-%d %H:%M')] [${{ steps.mode.outputs.mode }}]"
          git push
